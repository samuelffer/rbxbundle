name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Smoke test installed CLI
        run: |
          python -c "import shutil, subprocess, sys; exe = shutil.which('rbxbundle') or shutil.which('rbxbundle.exe'); assert exe, 'rbxbundle entry point not found after pip install .'; subprocess.run([exe, '--version'], check=True); subprocess.run([exe, 'list', '--dir', '.'], check=True)"

      - name: Run tests
        run: python -m unittest discover tests -v
